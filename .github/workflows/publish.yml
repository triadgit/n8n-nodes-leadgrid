# Publishes to npm with provenance when a v*.*.* tag is pushed.
# Uses npm Trusted Publishers via GitHub OIDC — no NPM_TOKEN needed.
# Required for n8n Creator Portal verification from May 1, 2026.

name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (OIDC trusted publishing needs >=11.5.1)
        run: npm install -g npm@latest

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish (with provenance)
        run: npm publish --provenance --access public
