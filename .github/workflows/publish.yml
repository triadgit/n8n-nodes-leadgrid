# Publishes to npm with provenance when a v*.*.* tag is pushed.
# Uses npm Trusted Publishers via GitHub OIDC — no NPM_TOKEN needed.
# Required for n8n Creator Portal verification from May 1, 2026.

name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # Node 24 ships with npm 11.x which supports OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Show npm version
        run: npm --version

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # --ignore-scripts skips prepublishOnly (n8n-node prerelease), which is a
      # local-dev guardrail. Lint + build already ran as explicit steps above.
      - name: Publish (with provenance)
        run: npm publish --provenance --access public --ignore-scripts
